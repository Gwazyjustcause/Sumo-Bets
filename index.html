<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070b16" />
    <meta
      name="description"
      content="Sumo Battle — Gwazy and Jake's private, no-money fantasy sumo competition."
    />
    <title>Sumo Battle · Gwazy vs Jake</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>相</text></svg>" />
    <link rel="preconnect" href="https://www.sumo.or.jp" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="ambient ambient-one" aria-hidden="true"></div>
    <div class="ambient ambient-two" aria-hidden="true"></div>

    <header class="app-header">
      <a class="brand" href="#overview" aria-label="Sumo Battle home">
        <span class="brand-mon" aria-hidden="true"><span>相</span></span>
        <span>
          <strong>SUMO BATTLE</strong>
          <small>Gwazy <i>vs</i> Jake</small>
        </span>
      </a>

      <nav class="main-nav" aria-label="Primary navigation">
        <a href="#overview" data-route="overview"><span>⌂</span>Overview</a>
        <a href="#roster" data-route="roster"><span>♙</span>Roster</a>
        <a href="#banzuke" data-route="banzuke"><span>番</span>Banzuke</a>
        <a href="#results" data-route="results"><span>✓</span>Results</a>
        <a href="#history" data-route="history"><span>↺</span>History</a>
        <a href="#settings" data-route="settings"><span>⚙</span>Settings</a>
      </nav>

      <div class="header-tools">
        <button class="icon-button" id="sound-toggle" type="button" aria-label="Toggle score sounds" aria-pressed="false">
          <span aria-hidden="true">♫</span>
        </button>
        <label class="player-selector" for="active-player-select">
          <span class="player-selector-icon" aria-hidden="true">●</span>
          <span class="player-selector-copy"><small>PLAYING AS</small><b id="active-player-label">Gwazy</b></span>
          <select id="active-player-select" aria-label="Playing as">
            <option value="gwazy">Gwazy</option>
            <option value="jake">Jake</option>
          </select>
          <span class="player-selector-arrow" aria-hidden="true">⌄</span>
        </label>
      </div>
    </header>

    <main id="app" tabindex="-1"></main>

    <nav class="mobile-nav" aria-label="Mobile navigation">
      <a href="#overview" data-route="overview"><span>⌂</span>Home</a>
      <a href="#roster" data-route="roster"><span>♙</span>Roster</a>
      <a href="#banzuke" data-route="banzuke"><span>番</span>Banzuke</a>
      <a href="#results" data-route="results"><span>✓</span>Results</a>
      <a href="#history" data-route="history"><span>↺</span>History</a>
      <a href="#settings" data-route="settings"><span>⚙</span>More</a>
    </nav>

    <dialog class="profile-dialog" id="profile-dialog" aria-labelledby="profile-name">
      <button class="dialog-close" type="button" aria-label="Close profile">×</button>
      <div id="profile-content"></div>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="data/sumo-data.js"></script>
    <script src="image-resolver.js"></script>
    <script src="app.js"></script>
  </body>
</html>

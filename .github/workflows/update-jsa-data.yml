name: Update official JSA data

on:
  schedule:
    # Runs every six hours during a basho; the script self-throttles to daily outside it.
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: jsa-official-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch official JSA snapshot
        run: node scripts/update-official-data.mjs --scheduled

      - name: Detect official data changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- data/official data/sumo-data.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated official files
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/official data/sumo-data.js
          git commit -m "data: refresh official JSA snapshot"
          git push
